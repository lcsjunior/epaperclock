<svg xmlns="http://www.w3.org/2000/svg" width="340" height="400" viewBox="0 0 340 400" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- module PCB -->
  <rect x="8" y="8" width="324" height="384" rx="16" fill="#e6e8ea" stroke="#b7bcc2" stroke-width="2"/>
  <!-- mounting holes -->
  <circle cx="26" cy="26" r="5" fill="#fff" stroke="#b7bcc2"/>
  <circle cx="314" cy="26" r="5" fill="#fff" stroke="#b7bcc2"/>
  <circle cx="26" cy="374" r="5" fill="#fff" stroke="#b7bcc2"/>
  <circle cx="314" cy="374" r="5" fill="#fff" stroke="#b7bcc2"/>

  <!-- 200x200 active area -->
  <rect x="42" y="44" width="256" height="256" fill="#fbfbf9" stroke="#3a3a3a" stroke-width="2"/>

  <!-- time -->
  <text x="170" y="146" text-anchor="middle" font-size="80" font-weight="700" letter-spacing="1" fill="#141414" font-family="'DejaVu Sans Mono', 'Menlo', monospace">14:37</text>

  <!-- weather row: outline thunderstorm icon + temperature, centered as a block -->
  <g transform="translate(14,20)">
    <g transform="translate(114,206) scale(0.85) translate(-114,-206)">
      <g fill="none" stroke="#141414" stroke-width="6.5" stroke-linejoin="round" stroke-linecap="round">
        <!-- cloud -->
        <path d="M92 210 a17 17 0 0 1 2 -33.6 a24 24 0 0 1 45 -4.6 a15 15 0 0 1 2 38.2 z"/>
        <!-- rain streaks -->
        <line x1="100" y1="218" x2="95"  y2="232"/>
        <line x1="140" y1="218" x2="135" y2="232"/>
      </g>
      <!-- lightning bolt (filled) -->
      <path d="M124 212 L110 234 L120 234 L112 252 L136 228 L124 228 L131 212 Z" fill="#141414"/>
    </g>
    <!-- temperature -->
    <text x="160" y="228" font-size="38" font-weight="600" fill="#141414">18°C</text>
  </g>

  <!-- city -->
  <text x="170" y="286" text-anchor="middle" font-size="24" font-weight="500" fill="#3a3a3a">City</text>

  <!-- FPC connector tab -->
  <rect x="120" y="300" width="100" height="14" fill="#d6b24a" stroke="#b7902f"/>

  <!-- caption -->
  <text x="170" y="352" text-anchor="middle" font-size="17" fill="#5a5f66">1.54" e-Paper &#183; 200&#215;200 &#183; SSD1681</text>
</svg>
